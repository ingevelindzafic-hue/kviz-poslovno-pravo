// ==================== KRAJ DEFINICIJA PITANJA ====================
// JavaScript logika prikaza i bodovanja
let userSelections = [];
function initSel() { userSelections = []; for(let i=0;i<questionsData.length;i++) userSelections.push({a:false,b:false,c:false,d:false}); }
function isCorrect(i){ let q=questionsData[i], s=userSelections[i]; for(let l of q.correctLetters) if(!s[l]) return false; for(let l of ['a','b','c','d']) if(s[l] && !q.correctLetters.includes(l)) return false; return true; }
function score(){ let s=0; for(let i=0;i<questionsData.length;i++) if(isCorrect(i)) s++; return s; }
function answered(){ return userSelections.filter(s=>Object.values(s).some(v=>v)).length; }
function updateStats(){ document.getElementById('answeredCounter').innerText=`📌 Odgovoreno: ${answered()} / ${questionsData.length}`; document.getElementById('scoreCounter').innerHTML=`⭐ Bodovi: ${score()} / ${questionsData.length}`; document.getElementById('resultsPanel').innerHTML=`📊 Ukupno bodova: ${score()} / ${questionsData.length}`; }
function updateFB(i){ let fb=document.getElementById(`fb-${i}`); if(!fb) return; let any=Object.values(userSelections[i]).some(v=>v); if(!any){ fb.innerHTML="❌ Niti jedna opcija nije označena."; fb.className="feedback"; return; } if(isCorrect(i)){ fb.innerHTML="✅ Tačno! Svi tačni odgovori su označeni."; fb.className="feedback correct"; } else { fb.innerHTML="⚠️ Netočno ili nepotpuno."; fb.className="feedback wrong"; } }
function renderAll(){ let container=document.getElementById('questionsContainer'); if(!container) return; container.innerHTML=''; for(let idx=0;idx<questionsData.length;idx++){ let q=questionsData[idx]; let card=document.createElement('div'); card.className='question-card'; card.innerHTML=`<div class="question-text">${q.num}. ${q.text}</div><div class="options-list" id="opts-${idx}"></div><div class="feedback" id="fb-${idx}"></div>`; container.appendChild(card); let optsDiv=card.querySelector(`.options-list`); q.options.forEach(opt=>{ let label=document.createElement('label'); label.className='option-item'; let cb=document.createElement('input'); cb.type='checkbox'; cb.className='option-check'; cb.checked=userSelections[idx][opt.letter]; cb.addEventListener('change',()=>{ userSelections[idx][opt.letter]=cb.checked; updateFB(idx); updateStats(); }); let span=document.createElement('span'); span.className='option-label'; span.innerText=`${opt.letter.toUpperCase()}) ${opt.text}`; label.appendChild(cb); label.appendChild(span); optsDiv.appendChild(label); }); updateFB(idx); } updateStats(); }
function resetQuiz(){ initSel(); renderAll(); updateStats(); }
function checkAll(){ for(let i=0;i<questionsData.length;i++) updateFB(i); updateStats(); }
initSel(); renderAll(); document.getElementById('checkBtn').addEventListener('click',checkAll); document.getElementById('resetBtn').addEventListener('click',resetQuiz);
</script>
