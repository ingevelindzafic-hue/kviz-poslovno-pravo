            options: [

            correctLetters

    }

    // === 1-20 ===
    addQ(1, "Prema važećim propisima koji se odnose na oporezivanje dobiti pravnih lica, porez po odbitku plaća se na:", ['c'],

    addQ(18, "Prema Zakonu o obligacijama u BiH, cesija je obvezno pravni posao u koji su uključeni cesus, cesionar i cedent, a za čiju pravnu valjanost:", ['c'],

    addQ(19, "Prema Zakonu o porezu na dobit u Federaciji BiH, porezno priznatim rashodima smatraju se:", ['c'],

    // === 41-60 ===

    // ========== LOGIKA PRIKAZIVANJA ==========
    let userSelections = [];
    function initSelections() {
        userSelections = [];
        for (let i = 0; i < questionsData.length; i++) {
            userSelections.push({ a: false, b: false, c: false, d: false });
        }
    }

    function isCorrect(idx) {
        const q = questionsData[idx];
        const sel = userSelections[idx];
        for (let l of q.correctLetters) if (!sel[l]) return false;
        for (let l of ['a','b','c','d']) if (sel[l] && !q.correctLetters.includes(l)) return false;
        return true;
    }

    function computeScore() { let s=0; for(let i=0;i<questionsData.length;i++) if(isCorrect(i)) s++; return s; }
    function answeredCount() { return userSelections.filter(s => Object.values(s).some(v=>v)).length; }

    function updateStats() {
        document.getElementById('answeredCounter').innerText = `📌 Odgovoreno: ${answeredCount()} / ${questionsData.length}`;
        document.getElementById('scoreCounter').innerHTML = `⭐ Bodovi: ${computeScore()} / ${questionsData.length}`;
        document.getElementById('resultsPanel').innerHTML = `📊 Ukupno bodova: ${computeScore()} / ${questionsData.length} (tačnih pitanja).`;
    }

    function updateSingleFeedback(idx) {
        const fb = document.getElementById(`fb-${idx}`);
        if (!fb) return;
        const anyMarked = Object.values(userSelections[idx]).some(v=>v);
        if (!anyMarked) { fb.innerHTML = "❌ Niti jedna opcija nije označena."; fb.className = "feedback"; return; }
        if (isCorrect(idx)) { fb.innerHTML = "✅ Tačno! Svi tačni odgovori su označeni."; fb.className = "feedback correct"; }
        else { fb.innerHTML = "⚠️ Netočno ili nepotpuno. Provjeri tačne opcije."; fb.className = "feedback wrong"; }
    }

    function renderAll() {
        const container = document.getElementById('questionsContainer');
        if (!container) return;
        container.innerHTML = '';
        for (let idx = 0; idx < questionsData.length; idx++) {
            const q = questionsData[idx];
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${q.num}. ${q.text}</div><div class="options-list" id="opts-${idx}"></div><div class="feedback" id="fb-${idx}"></div>`;
            container.appendChild(card);
            const optsDiv = card.querySelector(`.options-list`);
            q.options.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'option-item';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'option-check';
                cb.checked = userSelections[idx][opt.letter];
                cb.addEventListener('change', () => {
                    userSelections[idx][opt.letter] = cb.checked;
                    updateSingleFeedback(idx);
                    updateStats();
                });
                const span = document.createElement('span');
                span.className = 'option-label';
                span.innerText = `${opt.letter.toUpperCase()}) ${opt.text}`;
                label.appendChild(cb);
                label.appendChild(span);
                optsDiv.appendChild(label);
            });
            updateSingleFeedback(idx);
        }
        updateStats();
    }

    function resetQuiz() { initSelections(); renderAll(); updateStats(); }
    function checkAllAnswers() { for(let i=0;i<questionsData.length;i++) updateSingleFeedback(i); updateStats(); }

    initSelections();
    renderAll();
    document.getElementById('checkBtn').addEventListener('click', checkAllAnswers);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
</script>
</body>
</html>
